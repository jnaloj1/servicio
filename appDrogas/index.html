<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>appDrogas - PWA Profesional</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .section-title { font-weight: bold; border-bottom: 1px solid #e5e7eb; margin-bottom: 0.75rem; color: #1e40af; text-transform: uppercase; font-size: 0.875rem; }
        .input-group { background-color: white; padding: 1rem; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 1rem; }
        label { display: block; font-size: 0.75rem; font-weight: 600; color: #4b5563; margin-bottom: 0.25rem; }
        input[type="text"], input[type="date"], input[type="time"], input[type="number"], select {
            width: 100%; border: 1px solid #d1d5db; padding: 0.5rem; border-radius: 0.25rem; outline: none; text-transform: uppercase;
        }
        input:focus, select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5); }

        /* Estilos para colapsables */
        .card-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, margin-top 0.3s ease-out;
        }
        .card-active .card-content {
            max-height: 2000px;
            margin-top: 0.75rem;
            transition: max-height 0.5s ease-in;
        }
        .chevron-icon {
            transition: transform 0.3s ease;
        }
        .card-active .chevron-icon {
            transform: rotate(180deg);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-10">
    <header class="bg-blue-900 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="window.location.href='/'" class="hover:bg-blue-800 p-1 rounded transition-colors" title="Volver al portal">
                <i class="fas fa-home text-xl"></i>
            </button>
            <button onclick="window.location.href='menu.html'" class="hover:bg-blue-800 p-1 rounded transition-colors" title="Volver al menú">
                <i class="fas fa-arrow-left text-xl"></i>
            </button>
            <h1 class="text-lg font-bold">appDrogas v2.0</h1>
        </div>
        <button onclick="window.location.reload()" class="text-xs bg-blue-700 px-2 py-1 rounded">Refrescar</button>
    </header>

    <main class="p-4 max-w-2xl mx-auto">
        <form id="drugForm" class="space-y-4">

            <!-- Localización y Destacamento -->
            <div class="input-group">
                <div class="section-header" onclick="toggleCard(this.parentElement)">
                    <h2 class="section-title mb-0 border-b-0">Datos de Localización</h2>
                    <i class="fas fa-chevron-down chevron-icon text-blue-900"></i>
                </div>
                <div class="card-content">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label>FECHA</label>
                            <input type="date" id="fecha" required>
                        </div>
                        <div>
                            <label>HORA</label>
                            <input type="time" id="hora" required>
                        </div>
                    </div>
                    <div class="mt-3">
                        <label>LUGAR / PK</label>
                        <input type="text" id="lugar" placeholder="Ej: A-4 KM 120">
                    </div>
                    <div class="mt-3">
                        <label>DESTACAMENTO</label>
                        <input type="text" id="destacamento" placeholder="Nombre del Destacamento">
                    </div>
                </div>
            </div>

            <!-- Datos del Control -->
            <div class="input-group">
                <div class="section-header" onclick="toggleCard(this.parentElement)">
                    <h2 class="section-title mb-0 border-b-0">Datos del Control</h2>
                    <i class="fas fa-chevron-down chevron-icon text-blue-900"></i>
                </div>
                <div class="card-content">
                    <div class="mb-3">
                        <label>TIPO DE CONTROL</label>
                        <select id="tipoControl">
                            <option value="">SELECCIONAR...</option>
                            <option value="PREVENTIVO">PREVENTIVO</option>
                            <option value="INFRACCION">INFRACCIÓN</option>
                            <option value="ACCIDENTE">ACCIDENTE</option>
                            <option value="SINTOMAS">SÍNTOMAS</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label>TIPO PRUEBA</label>
                            <select id="tipoPrueba">
                                <option value="">SELECCIONAR...</option>
                                <option value="DRAGER">DRAGER</option>
                                <option value="ALERE">ALERE</option>
                                <option value="SOTOXA">SOTOXA</option>
                                <option value="OTRO">OTRO</option>
                            </select>
                        </div>
                        <div>
                            <label>Nº LOTE</label>
                            <input type="text" id="numeroLote">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-3">
                        <div>
                            <label>Nº PRUEBA</label>
                            <input type="text" id="numeroPrueba">
                        </div>
                        <div>
                            <label>PEGATINA</label>
                            <input type="text" id="pegatina">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-3">
                        <div>
                            <label>EXPEDIENTE</label>
                            <input type="text" id="expediente">
                        </div>
                        <div>
                            <label>DILIGENCIAS</label>
                            <input type="text" id="diligencias">
                        </div>
                    </div>
                    <div class="mt-3">
                        <label>AGENTE (TIP)</label>
                        <input type="text" id="agente" readonly class="bg-gray-100 cursor-not-allowed font-bold text-blue-800">
                    </div>
                </div>
            </div>

            <!-- Resultado y Sustancias -->
            <div class="input-group">
                <div class="section-header" onclick="toggleCard(this.parentElement)">
                    <h2 class="section-title mb-0 border-b-0">Resultado de la Prueba</h2>
                    <i class="fas fa-chevron-down chevron-icon text-blue-900"></i>
                </div>
                <div class="card-content">
                    <div class="flex justify-around mb-4 bg-gray-50 p-3 rounded">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="resultado" value="NEGATIVO" class="h-5 w-5" checked onchange="toggleSustancias()">
                            <span class="text-green-700 font-bold">NEGATIVO</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="resultado" value="POSITIVO" class="h-5 w-5" onchange="toggleSustancias()">
                            <span class="text-red-700 font-bold">POSITIVO</span>
                        </label>
                    </div>

                    <div id="sustanciasSection" class="hidden grid grid-cols-2 gap-2 border-t pt-3">
                        <label class="flex items-center gap-2"><input type="checkbox" class="sustancia" value="CANNABIS"> CANNABIS</label>
                        <label class="flex items-center gap-2"><input type="checkbox" class="sustancia" value="COCAINA"> COCAINA</label>
                        <label class="flex items-center gap-2"><input type="checkbox" class="sustancia" value="ANFETAMINA"> ANFETAMINA</label>
                        <label class="flex items-center gap-2"><input type="checkbox" class="sustancia" value="META-ANFETAMINA"> META-ANF.</label>
                        <label class="flex items-center gap-2"><input type="checkbox" class="sustancia" value="BENZODIACEPINA"> BENZODIAC.</label>
                        <label class="flex items-center gap-2"><input type="checkbox" class="sustancia" value="OPIACEOS"> OPIÁCEOS</label>
                    </div>
                </div>
            </div>

            <!-- Persona Sometida -->
            <div class="input-group">
                <div class="section-header" onclick="toggleCard(this.parentElement)">
                    <h2 class="section-title mb-0 border-b-0">Datos Persona Sometida</h2>
                    <i class="fas fa-chevron-down chevron-icon text-blue-900"></i>
                </div>
                <div class="card-content">
                    <label>NOMBRE Y APELLIDOS</label>
                    <input type="text" id="nombre" class="mb-1">
                    <hr class="mb-3 border-gray-300">
                    <div class="grid grid-cols-2 gap-4 mb-3">
                        <div>
                            <label>DNI / NIE</label>
                            <input type="text" id="dni">
                        </div>
                        <div>
                            <label>FECHA NACIMIENTO</label>
                            <input type="date" id="fechaNac">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-3">
                        <div>
                            <label>TELÉFONO</label>
                            <input type="text" id="telefono">
                        </div>
                        <div>
                            <label>LOCALIDAD</label>
                            <input type="text" id="localidad">
                        </div>
                    </div>
                    <label>DOMICILIO</label>
                    <input type="text" id="domicilio">
                </div>
            </div>

            <!-- Datos Vehículo -->
            <div class="input-group">
                <div class="section-header" onclick="toggleCard(this.parentElement)">
                    <h2 class="section-title mb-0 border-b-0">Datos del Vehículo</h2>
                    <i class="fas fa-chevron-down chevron-icon text-blue-900"></i>
                </div>
                <div class="card-content">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label>TIPO VEHÍCULO</label>
                            <input type="text" id="tipoVehiculo">
                        </div>
                        <div>
                            <label>MATRÍCULA</label>
                            <input type="text" id="matricula">
                        </div>
                    </div>
                    <div class="mt-3">
                        <label>MARCA / MODELO</label>
                        <input type="text" id="marcaModelo">
                    </div>
                </div>
            </div>

            <!-- Botones -->
            <div class="flex gap-3 sticky bottom-4">
                <button type="button" id="btnRegistros" class="bg-gray-600 text-white px-4 py-3 rounded-lg shadow-lg uppercase font-bold text-sm">Ver Historial</button>
                <button type="submit" class="flex-1 bg-blue-800 text-white py-3 rounded-lg shadow-lg uppercase font-bold">Guardar Registro</button>
            </div>
        </form>
    </main>

    <script src="js/pdf-generator.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Verificación de sesión y SSO
        let currentUser = sessionStorage.getItem('appDrogas_User');

        if (!currentUser) {
            const portalUser = sessionStorage.getItem('loggedUser');
            if (portalUser) {
                try {
                    const userObj = JSON.parse(portalUser);
                    currentUser = userObj.username;
                    sessionStorage.setItem('appDrogas_User', currentUser);
                } catch (e) { console.error(e); }
            }
        }

        if (!currentUser) {
            window.location.href = 'login.html';
        }

        function toggleCard(el) {
            el.classList.toggle('card-active');
        }

        function toggleSustancias() {
            const isPositivo = document.querySelector('input[name="resultado"]:checked').value === 'POSITIVO';
            document.getElementById('sustanciasSection').classList.toggle('hidden', !isPositivo);
        }

        // Inicializar estado al cargar
        document.addEventListener('DOMContentLoaded', () => {
            toggleSustancias();
            // Todas las tarjetas inician colapsadas
        });
    </script>
</body>
</html>
